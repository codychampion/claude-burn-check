name: npm-cli

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate package metadata
        run: npm pkg get name version bin
      - name: Run CLI help
        run: node bin/claude-burn-check.js --help
      - name: Validate repository skill
        run: node bin/claude-burn-check.js doctor --repo
      - name: Check package contents
        run: npm pack --dry-run
